<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brody Search</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:180px;
    background:white;
}

.logo{
    font-size:72px;
    font-weight:bold;
}

.logo span:nth-child(1){color:#4285F4;}
.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.search-container{
    width:600px;
    margin:20px auto;
    position:relative;
}

.search-bar{
    width:100%;
    padding:15px;
    border-radius:25px;
    border:1px solid #ddd;
    font-size:18px;
    box-sizing:border-box;
}

.suggestion{
    display:none;
    text-align:left;
    border:1px solid #ddd;
    border-top:none;
    background:white;
    padding:12px;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.suggestion:hover{
    background:#f5f5f5;
}
</style>
</head>

<body>

<div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>



<input
    class="search-bar"
    type="text"
    id="searchBox"
    placeholder="Search..."
    autocomplete="off">

<div class="suggestion" id="suggestion"
     onclick="window.location.href='results.html'">
     🔍 Who is the best presidential candidate?
</div>

<script>
const phrase = "Who is the best presidential candidate?";
const searchBox = document.getElementById("searchBox");
const suggestion = document.getElementById("suggestion");

searchBox.addEventListener("focus", () => {
    suggestion.style.display = "block";
});

searchBox.addEventListener("keydown", (e) => {
    e.preventDefault();

    let currentLength = searchBox.value.length;

    if (e.key === "Backspace") {
        searchBox.value = phrase.substring(
            0,
            Math.max(0, currentLength - 1)
        );
    } else if (currentLength < phrase.length) {
        searchBox.value = phrase.substring(
            0,
            currentLength + 1
        );
    }
});
</script>

</script>

</body>
</html>
